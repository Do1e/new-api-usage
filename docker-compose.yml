services:
  new-api-usage:
    image: do1e/new-api-usage:latest
    container_name: new-api-usage
    network_mode: bridge
    ports:
      - "3000:3000"
    volumes:
      - /etc/localtime:/etc/localtime:ro
    env_file:
      # Copy the .env.example to .docker.env and fill in the required values before running
      - .docker.env
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
